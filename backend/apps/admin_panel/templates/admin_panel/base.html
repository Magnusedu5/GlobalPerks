<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GlobalPerks Admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #100806;
      --surface:    #1C0E08;
      --surface-raised: #2A1510;
      --border:     #3D1F14;
      --text:       #FAF0E6;
      --muted:      #C4A882;
      --gold:       #C4753A;
      --gold-dim:   #8B3A3A;
      --red: #E24B4A;
      --green: #5DCAA5;
      --amber: #EF9F27;
      --blue: #85B7EB;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', 'Helvetica Neue', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      justify-content: space-between;
      z-index: 100;
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 20px;
      color: #C4753A;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-decoration: none;
    }
    .nav-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .btn-signout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .btn-signout:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .main {
      margin-top: 56px;
      padding: 32px 24px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
    }

    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 2px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: inline-block;
    }
    .badge-pending   { background: rgba(186,117,23,0.15);  color: #EF9F27; border: 1px solid rgba(186,117,23,0.3); }
    .badge-confirmed { background: rgba(29,158,117,0.15);  color: #5DCAA5; border: 1px solid rgba(29,158,117,0.3); }
    .badge-declined  { background: rgba(226,75,74,0.15);   color: #F09595; border: 1px solid rgba(226,75,74,0.3); }
    .badge-completed { background: rgba(55,138,221,0.15);  color: #85B7EB; border: 1px solid rgba(55,138,221,0.3); }
    .badge-archived  { background: rgba(136,135,128,0.15); color: #B4B2A9; border: 1px solid rgba(136,135,128,0.3); }

    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-link { font-size: 13px; color: var(--muted); text-decoration: none; letter-spacing: 0.03em; }
    .nav-link:hover { color: var(--gold); text-decoration: none; }
    .btn-primary {
      display: inline-block; background: var(--gold); color: #100806; border: none;
      padding: 10px 20px; font-family: inherit; font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      text-decoration: none; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; text-decoration: none; color: #100806; }
    .btn-sm {
      display: inline-block; background: var(--surface-raised); color: var(--text);
      border: 1px solid var(--border); padding: 6px 12px; font-family: inherit;
      font-size: 12px; cursor: pointer; text-decoration: none; transition: border-color 0.2s;
    }
    .btn-sm:hover { border-color: var(--gold); color: var(--gold); text-decoration: none; }
    .btn-outline {
      display: inline-block; background: transparent; color: var(--muted);
      border: 1px solid var(--border); padding: 6px 12px; font-family: inherit;
      font-size: 12px; cursor: pointer; text-decoration: none; transition: border-color 0.2s;
    }
    .btn-outline:hover { border-color: var(--muted); color: var(--text); text-decoration: none; }
    .banner { padding: 12px 16px; font-size: 13px; margin-bottom: 16px; }
    .banner-success { background: rgba(29,158,117,0.1); border: 1px solid rgba(29,158,117,0.3); color: #5DCAA5; }
    .banner-error { background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.3); color: #F09595; }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a href="/admin-panel/bookings/" class="nav-brand">GlobalPerks Admin</a>
    <div class="nav-links">
      <a href="/admin-panel/bookings/" class="nav-link">Bookings</a>
      <a href="/admin-panel/galleries/" class="nav-link">Galleries</a>
      <a href="/admin-panel/cms/" class="nav-link">Content</a>
    </div>
    <div class="nav-actions">
      <form action="/admin-panel/logout/" method="post" style="margin:0;">
        {% csrf_token %}
        <button type="submit" class="btn-signout">Sign out</button>
      </form>
    </div>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
