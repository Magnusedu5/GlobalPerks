<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookings — GlobalPerks Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--burg:#7A2E2E;--terra:#C4753A;--caramel:#D4A574;--bg:#120A06;--sidebar:#1a0f0a;--mid:#5a5a5a;--border:#e5e0db}
body{font-family:'Lato',sans-serif;display:flex;min-height:100vh;background:#f7f4f1;color:#1a1a1a}
/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;padding:32px 0;position:sticky;top:0;height:100vh}
.s-brand{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:#e8d5b7;text-align:center;padding:0 20px 4px}
.s-sub{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#7a6a5a;text-align:center;padding-bottom:32px}
.nav-link{display:block;padding:12px 24px;color:#c4b49a;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:all .2s}
.nav-link:hover,.nav-link.active{color:#e8d5b7;background:rgba(255,255,255,.05);border-left:3px solid var(--caramel)}
.nav-link:not(.active){border-left:3px solid transparent}
#logout-btn{margin-top:auto;display:block;padding:12px 24px;color:#7a6a5a;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;background:none;border:none;cursor:pointer;text-align:left;width:100%;transition:color .2s}
#logout-btn:hover{color:#c4b49a}
/* Main */
.main{flex:1;padding:40px;overflow-y:auto}
h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;margin-bottom:28px;color:var(--bg)}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat{background:#fff;border-radius:4px;padding:20px 24px;border-top:3px solid var(--caramel)}
.stat-n{font-size:2rem;font-weight:700;color:var(--burg)}
.stat-l{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-top:4px}
/* Filters */
.filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:#fff;font-family:'Lato',sans-serif;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--mid);transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--burg);color:#fff;border-color:var(--burg)}
/* Table */
.card{background:#fff;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);border-bottom:1px solid var(--border);background:#faf8f6}
td{padding:14px 16px;font-size:.875rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf8f6;cursor:pointer}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-confirmed{background:#d1fae5;color:#065f46}
.badge-declined{background:#fee2e2;color:#991b1b}
.badge-completed{background:#dbeafe;color:#1e40af}
.badge-archived{background:#f3f4f6;color:#6b7280}
.empty{text-align:center;padding:48px;color:var(--mid)}
.loading{text-align:center;padding:48px;color:var(--mid)}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="s-brand">GlobalPerks</div>
  <div class="s-sub">Admin</div>
  <a href="/admin/bookings" class="nav-link">Bookings</a>
  <a href="/admin/galleries" class="nav-link">Galleries</a>
  <a href="/admin/cms" class="nav-link">Content</a>
  <button id="logout-btn">Logout</button>
</nav>

<main class="main">
  <h1>Bookings</h1>
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="s-pending">—</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n" id="s-month">—</div><div class="stat-l">Confirmed this month</div></div>
    <div class="stat"><div class="stat-n" id="s-done">—</div><div class="stat-l">Completed</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-status="">All</button>
    <button class="filter-btn" data-status="pending">Pending</button>
    <button class="filter-btn" data-status="confirmed">Confirmed</button>
    <button class="filter-btn" data-status="declined">Declined</button>
    <button class="filter-btn" data-status="completed">Completed</button>
    <button class="filter-btn" data-status="archived">Archived</button>
  </div>

  <div class="card">
    <div class="loading" id="loading">Loading…</div>
    <table id="table" style="display:none">
      <thead><tr>
        <th>Name</th><th>Service</th><th>Preferred Date</th><th>Submitted</th><th>Status</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No bookings found.</div>
  </div>
</main>

<script src="../config.js"></script>
<script src="admin.js"></script>
<script>
GP.init();

let currentFilter = '';

const BADGE = s => `<span class="badge badge-${s}">${s}</span>`;
const fmt = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';

async function load(status) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.status === status));
  document.getElementById('loading').style.display = 'block';
  document.getElementById('table').style.display = 'none';
  document.getElementById('empty').style.display = 'none';

  const res = await GP.fetch('/api/admin/bookings/' + (status ? '?status=' + status : ''));
  if (!res) return;
  const data = await res.json();

  const stats = data.stats || {};
  document.getElementById('s-total').textContent = stats.total ?? '—';
  document.getElementById('s-pending').textContent = stats.pending ?? '—';
  document.getElementById('s-month').textContent = stats.confirmed_this_month ?? '—';
  document.getElementById('s-done').textContent = stats.completed ?? '—';

  const bookings = data.bookings || [];
  document.getElementById('loading').style.display = 'none';

  if (!bookings.length) {
    document.getElementById('empty').style.display = 'block';
    return;
  }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = bookings.map(b => `
    <tr onclick="window.location.href='/admin/booking?id=${b.id}'">
      <td><strong>${b.name}</strong><br><span style="color:#888;font-size:.8rem">${b.email}</span></td>
      <td>${b.service || '—'}</td>
      <td>${fmt(b.preferred_date)}</td>
      <td>${fmt(b.created_at)}</td>
      <td>${BADGE(b.status || 'pending')}</td>
    </tr>`).join('');
  document.getElementById('table').style.display = 'table';
}

document.querySelectorAll('.filter-btn').forEach(b =>
  b.addEventListener('click', () => load(b.dataset.status)));

load('');
</script>
</body>
</html>
